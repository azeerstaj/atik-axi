# Sky130/OpenROAD floorplan for standalone AtikCore, 2x2 mesh.

vlsi.inputs.clocks: [
  {name: "clock", period: "50ns", uncertainty: "2ns"}
]

par.openroad:
  timing_driven: false
  create_archive_mode: none
  write_reports: true
  floorplan_mode: generate
  macro_placement.halo: [50, 50]
  global_placement.timing_driven: false
  global_placement.routability_driven: false
  global_placement.placement_padding: 2
  detailed_placement.placement_padding: 1
  clock_tree.placement_padding: 1
  clock_tree_resize.placement_padding: 0
  clock_tree_resize.setup_margin: 0.0
  clock_tree_resize.hold_margin: 0.20
  global_route_resize.hold_margin: 0.60
  clock_tree_resize.hold_max_buffer_percent: 80
  global_placement.routing_adjustment: 0.5
  global_route.routing_adjustment: 0.3
  global_route_resize.routing_adjustment: 0.2

drc.magic.generate_only: true
lvs.netgen.generate_only: true

vlsi.inputs.placement_constraints:
  - path: "AtikCore"
    type: toplevel
    x: 0
    y: 0
    width: 2800
    height: 2800
    margins:
      left: 20
      right: 20
      top: 20
      bottom: 20

  - path: "AtikCore/attentionOpt/kSrams_0/bank/mem/mem_ext/mem_0_0"
    type: hardmacro
    x: 140
    y: 320
    orientation: r0
  - path: "AtikCore/attentionOpt/kSrams_1/bank/mem/mem_ext/mem_0_0"
    type: hardmacro
    x: 140
    y: 700
    orientation: r0
  - path: "AtikCore/attentionOpt/qSrams_0/bank/mem/mem_ext/mem_0_0"
    type: hardmacro
    x: 140
    y: 1080
    orientation: r0
  - path: "AtikCore/attentionOpt/qSrams_1/bank/mem/mem_ext/mem_0_0"
    type: hardmacro
    x: 140
    y: 1460
    orientation: r0

  - path: "AtikCore/matmul/aSrams_0/bank/mem/mem_ext/mem_0_0"
    type: hardmacro
    x: 2380
    y: 320
    orientation: mx
  - path: "AtikCore/matmul/aSrams_1/bank/mem/mem_ext/mem_0_0"
    type: hardmacro
    x: 2380
    y: 700
    orientation: mx
  - path: "AtikCore/matmul/bSrams_0/bank/mem/mem_ext/mem_0_0"
    type: hardmacro
    x: 2380
    y: 1080
    orientation: mx
  - path: "AtikCore/matmul/bSrams_1/bank/mem/mem_ext/mem_0_0"
    type: hardmacro
    x: 2380
    y: 1460
    orientation: mx
